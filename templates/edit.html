{% extends 'base.html' %}

{% block head%}

<h1>Edit recipe {{ recipe.name }}</h1>

{% endblock %}


{% block body%}

<div>
    <h1>Add a recipe</h1>
    <form class="add_form" method="POST" action="/update/{{recipe.id}}">
        <input name="name" value="{{recipe.name}}">
        <input name="ingredients" value="{{recipe.ingredients}}">
        <input name="instructions" value="{{recipe.instructions}}">
        <input name="time" value="{{recipe.time}}">
    
        <button type="submit">Update recipe</button>
    </form>
</div>


{% endblock %}
